<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>
        {% block title %}
        Auth
        {% endblock %}
    </title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='auth.css') }}">

</head>

<body class="auth-body">

    <div class="auth-container">

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}

                    <div class="flash-message">
                        {{ msg }}
                    </div>

                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}
        {% endblock %}

    </div>

</body>
</html>
